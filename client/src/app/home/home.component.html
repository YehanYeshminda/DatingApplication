<div class="container mt-5">
  <!-- if the person is not registered -->
  <div style="text-align: center" *ngIf="!registerMode">
    <h1>Find your match</h1>
    <p class="lead">
      Come on to view your matches... All you need to do is sign up!
    </p>
    <div class="text-center">
      <!-- will make sure the register will pop up or not -->
      <button class="btn btn-primary btn-lg mr-2" (click)="registerToggle()">
        Register
      </button>
      <button class="btn btn-info btn-lg">Learn more</button>
    </div>
  </div>

  <!-- if the person wants to register -->
  <div class="container" *ngIf="registerMode">
    <div class="row justify-content-center">
      <div class="col-4">

        <!-- sending values from the parent to the child -->
        <app-register (cancelRegister)="cancelRegisterMode($event)"></app-register>
      </div>
    </div>
  </div>
</div>
