<form #registerForm="ngForm" (ngSubmit)="register()" autocomplete="off">
  <h2 class="text-center text-primary">Sign Up</h2>
  <hr />
  <div class="form-group">
    <!-- uses the name property to track whats being entered into the form -->
    <input
      type="text"
      class="form-control"
      name="username"
      [(ngModel)]="model.username"
      placeholder="Username"
    />
  </div>

  <!-- making a selector using angular bootstrap -->
  <!-- <div class="form-group">
    <label>Who is your favorite user?</label>
    <select class="form-control">
      <option *ngFor="let user of usersFromHome" [value]="user.userName">
        {{ user.userName }}
      </option>
    </select>
  </div> -->
  <!-- !making a selector using angular bootstrap -->

  <div class="form-group">
    <!-- uses the name property to track whats being entered into the form -->
    <input
      type="password"
      class="form-control"
      name="password"
      [(ngModel)]="model.password"
      placeholder="Password"
    />
  </div>

  <div class="form-group text-center">
    <button class="btn btn-success mr-2" type="submit">Register</button>
    <button class="btn btn-info mr-2" type="button" (click)="cancel()">
      Cancel
    </button>
  </div>
</form>
